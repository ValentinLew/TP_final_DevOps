name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: lacets_connecte-api
  K8S_NAMESPACE: lacets_connecte

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - k3s

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check required tools
        run: |
          set -euo pipefail
          docker --version
          kubectl version --client=true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          # On utilise directement le secret ici, Docker Hub comprendra
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lacets_connecte-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lacets_connecte-api:latest

      - name: Deploy manifests
        run: |
          set -euo pipefail
          # On définit le user localement pour être sûr que kubectl le voit
          D_USER="${{ secrets.DOCKERHUB_USERNAME }}"
          kubectl apply -k k8s
          kubectl -n "$K8S_NAMESPACE" set image deployment/api api="$D_USER/lacets_connecte-api:${{ github.sha }}"
          kubectl -n "$K8S_NAMESPACE" rollout status statefulset/mysql --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/api --timeout=180s

      - name: Smoke test from inside cluster
        run: |
          set -euo pipefail
          kubectl -n "$K8S_NAMESPACE" delete pod curl-test --ignore-not-found
          kubectl -n "$K8S_NAMESPACE" run curl-test \
            --rm \
            --restart Never \
            --image curlimages/curl:8.11.1 \
            --command -- curl -fsS http://api:3000/health