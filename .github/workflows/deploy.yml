name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: lacets-connecte-api
  K8S_NAMESPACE: lacets-connecte

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - k3s

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check required tools
        run: |
          set -euo pipefail
          docker --version
          kubectl version --client=true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          # Utilisation du pseudo en dur pour éviter l'erreur de format
          tags: |
            finnnnnnndus/lacets-connecte-api:${{ github.sha }}
            finnnnnnndus/lacets-connecte-api:latest

      - name: Deploy manifests
        run: |
          set -euo pipefail
          # On applique les fichiers YAML du dossier k8s
          kubectl apply -k k8s
          # On force la mise à jour de l'image du déploiement
          kubectl -n "$K8S_NAMESPACE" set image deployment/api api="finnnnnnndus/lacets-connecte-api:${{ github.sha }}"
          # On attend que tout soit prêt
          kubectl -n "$K8S_NAMESPACE" rollout status statefulset/mysql --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/api --timeout=180s

  
      - name: Smoke test from inside cluster
        run: |
        set -euo pipefail
        kubectl -n "$K8S_NAMESPACE" delete pod curl-test --ignore-not-found# On lance le test sans l'option --rm qui posait problème
        kubectl -n "$K8S_NAMESPACE" run curl-test \--restart Never \--image curlimages/curl:8.11.1 \--command -- curl -fsS http://api:3000/health# On laisse 5s pour que le pod s'exécute
        sleep 5# On vérifie les logs pour confirmer le succès
        kubectl -n "$K8S_NAMESPACE" logs curl-test